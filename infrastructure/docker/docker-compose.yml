services:
  vault:
    image: hashicorp/vault:latest
    container_name: technova_vault
    ports:
      - "8200:8200"
    volumes:
      - ../vault:/vault/config
      - vault_data:/vault/file

    environment:
      VAULT_LOCAL_CONFIG: |
        {
          "ui": true,
          "backend": { "file": { "path": "/vault/file" } },
          "listener": [{
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": 1
            }
          }],
          "disable_mlock": true
        }
    cap_add:
      - IPC_LOCK
    command: "server"
    restart: unless-stopped

  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: technova_postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      VAULT_ADDR: http://vault:8200
      POSTGRES_VAULT_ROLE_ID: ${POSTGRES_VAULT_ROLE_ID}
      POSTGRES_VAULT_SECRET_ID: ${POSTGRES_VAULT_SECRET_ID}
    depends_on:
      - vault
    restart: unless-stopped

  mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    container_name: technova_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      VAULT_ADDR: http://vault:8200
      MONGO_VAULT_ROLE_ID: ${MONGO_VAULT_ROLE_ID}
      MONGO_VAULT_SECRET_ID: ${MONGO_VAULT_SECRET_ID}
    depends_on:
      - vault
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: technova_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: technova_mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    depends_on:
      - mongo
    restart: unless-stopped

  pgadmin:
    build:
      context: ./pgadmin
      dockerfile: Dockerfile
    container_name: technova_pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
      - vault
    environment:
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      VAULT_ADDR: http://vault:8200
      PGADMIN_VAULT_ROLE_ID: ${PGADMIN_VAULT_ROLE_ID}
      PGADMIN_VAULT_SECRET_ID: ${PGADMIN_VAULT_SECRET_ID}
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: technova_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      VAULT_ADDR: http://vault:8200
    depends_on:
      - vault
      - postgres
      - mongo
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  vault_data:
  